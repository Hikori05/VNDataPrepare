<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VN Data Processor</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-blur"></div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass">
            <div class="logo">
                <h2>VN.Extract</h2>
            </div>

            <nav class="nav-links">
                <a href="/" class="active">Processing</a>
                <a href="/review">Review Tool</a>
            </nav>

            <div class="control-group">
                <label>Input Folder</label>
                <select id="folderSelect">
                    <option value="" disabled selected>Loading...</option>
                </select>
            </div>

            <div class="control-group">
                <label>Output Filename</label>
                <input type="text" id="outputName" value="conversations" placeholder="conversations">
            </div>

            <div class="control-group">
                <label>Resize Factor: <span id="resizeVal">0.7</span></label>
                <input type="range" id="resizeFactor" min="0.1" max="1.0" step="0.1" value="0.7">
            </div>

            <div class="control-group">
                <label>AI Backend</label>
                <select id="aiBackend">
                    <option value="lmstudio" selected>LM Studio</option>
                    <option value="ollama">Ollama</option>
                </select>
            </div>

            <div class="control-group">
                <label>Model ID (Ollama)</label>
                <input type="text" id="modelID" placeholder="gemma:latest" value="">
            </div>

            <div class="actions">
                <button id="startBtn" class="btn primary">Start Processing</button>
                <button id="batchBtn" class="btn secondary" style="margin-top: 10px;">Batch Process All</button>
                <button id="stopBtn" class="btn danger" disabled>Stop</button>
            </div>

            <div class="status-panel">
                <p id="statusText">Ready</p>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar"></div>
                </div>
                <div id="statsContainer"
                    style="margin-top: 10px; font-size: 0.85em; color: var(--text-muted); display: none;">
                    <div style="display: flex; justify-content: space-between;"><span>Progress:</span> <span
                            id="statProgress">0 / 0</span></div>
                    <div style="display: flex; justify-content: space-between;"><span>Avg Time:</span> <span
                            id="statAvg">0s</span></div>
                    <div style="display: flex; justify-content: space-between;"><span>ETA:</span> <span
                            id="statETA">0s</span></div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Image Preview -->
            <div class="preview-section glass">
                <h3>Live Preview</h3>
                <div class="image-container">
                    <img id="currentImage" src="" alt="Waiting for start..." style="display: none;">
                    <div id="placeholderText">Select folder and start to see images</div>
                    ্লাস
                </div>
            </div>

            <!-- Extracted Data -->
            <div class="data-section glass">
                <h3>Extracted Conversation</h3>
                <div id="conversationLog" class="log-container">
                    <!-- Entries will appear here -->
                </div>
            </div>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
