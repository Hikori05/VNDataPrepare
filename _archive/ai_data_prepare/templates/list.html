<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/assets/style.css?v=2">
  <title>Title</title>
</head>

<body>

  <nav>
    {{ range .Nav }}

  <div class="card">

    {{end}}
  </div>
</body>

</html>
